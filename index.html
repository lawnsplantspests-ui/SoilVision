<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SoilVision</title>

  <style>

    body {

      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;

    }

    .container {

      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;

    }

    h1, h2 {

      text-align: center;

    }

    form {

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;

    }

    textarea {

      grid-column: span 2;
      min-height: 100px;

    }

    button {

      padding: 12px;
      font-size: 16px;
      cursor: pointer;

    }

    input,
    textarea {

      padding: 12px;
      font-size: 16px;

    }

    .full-width {

      grid-column: span 2;

    }

    #status {

      margin-top: 20px;
      font-weight: bold;
      text-align: center;

    }

    .sample-card {

      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;

    }

    .top-buttons {

      display: flex;
      gap: 10px;
      margin-top: 20px;

    }

    @media(max-width: 700px) {

      form {

        grid-template-columns: 1fr;

      }

      textarea,
      .full-width {

        grid-column: span 1;

      }

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>SoilVision</h1>

    <form id="soilForm">

      <input type="text" id="customer_id" placeholder="Customer ID">

      <input type="date" id="sample_date">

      <input type="text" id="field_id" placeholder="Field ID">

      <input type="number" step="0.1" id="ph" placeholder="pH">

      <input type="number" id="phosphorus" placeholder="Phosphorus">

      <input type="number" id="potassium" placeholder="Potassium">

      <input type="number" step="0.1" id="acidity" placeholder="Acidity">

      <input type="number" step="0.1" id="cec" placeholder="CEC">

      <input type="number" step="0.1" id="calcium" placeholder="Calcium">

      <input type="number" step="0.1" id="magnesium" placeholder="Magnesium">

      <input type="text" id="lime_rec" placeholder="Lime Recommendation">

      <input type="text" id="nitrogen_rec" placeholder="Nitrogen Recommendation">

      <textarea id="notes" placeholder="Notes"></textarea>

      <button class="full-width" type="submit">
        Save Sample
      </button>

    </form>

    <div id="status"></div>

    <div class="top-buttons">

      <button onclick="loadSamples()">
        Load Samples
      </button>

      <button onclick="clearSamples()">
        Clear Display
      </button>

    </div>

    <div id="samplesContainer"></div>

  </div>

  <script>

            ${sample.calcium}</p>

            <p><strong>Magnesium:</strong>
            ${sample.magnesium}</p>

            <p><strong>Lime:</strong>
            ${sample.lime_rec}</p>

            <p><strong>Nitrogen:</strong>
            ${sample.nitrogen_rec}</p>

            <hr>

        });

      } catch(error) {

        console.error(error);

      }

    }

    function clearSamples() {

      document.getElementById(
        "samplesContainer"
      ).innerHTML = "";

    }

  </script>

</body>
</html>
